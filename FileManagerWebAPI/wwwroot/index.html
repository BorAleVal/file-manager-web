<style>
    :root {
        --font-color: aqua;
        --back-color: darkblue;
        --highlight-color: midnightblue;
        --head-height: 30px;
        --panel-head-height: 22px;
        --panel-foot-height: 25px;
    }

    body {
        margin: 0px;
        padding: 8px
    }

    header {
        height: var(--head-height);
    }


    select,
    button {
        cursor: pointer;
        background-color: darkgray;
        margin: 2px;
    }

    body {
        background-color: var(--back-color);
        font-family: monospace;
        color: white;
    }

    .folder-tools {
        align-items: center;
        justify-content: left;
        display: flex;
        height: var(--panel-head-height);
        padding: 2px;
    }

    .folder-tools p {
        white-space: nowrap;
        overflow: auto;
        text-overflow: ellipsis;
    }

    .table-container {
        overflow: auto;
        /*так и не удалось разобраться, почему вычисления выдают верный результат, но появляется скроллбар, пришлось добавить магические 24px*/
        height: calc(100vh - var(--head-height) - var(--panel-head-height) - var(--panel-foot-height) - 24px);
    }

    .content {
        border: 1px solid;
        border-radius: 1px;
        border-collapse: collapse;
        color: var(--font-color);
        width: 100%;
        overflow-x: hidden;
    }

    .content th {
        background-color: var(--back-color);
        color: yellow;
        border-color: var(--font-color);
        position: sticky;
        top: 0;
    }

    .content td,
    th {
        padding: 2px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        border: 1px solid;
    }

    td:nth-child(1) {
        cursor: pointer;
        width: auto;
    }
    td:nth-child(2),
    td:nth-child(3) {
        text-align: right;
        width: 60px;
        background: var(--highlight-color);
    }

    .bottom-buttons {
        position: sticky;
        bottom: 0;
        border: 1px solid;
        border-color: var(--font-color);
        width: 100%;
        height: var(--panel-foot-height)
    }

    .selected-row {
        color: darkgray;
    }

    .panels-container {
        display: flex;
    }

    .fa {
        padding-right: 3px;
    }

    .panel {
        border: 1px solid;
        border-color: var(--font-color);
        width: 50vw;
        border-collapse: collapse;
    }

    tbody tr:hover {
        background: var(--highlight-color);
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Simple File Manager</title>
</head>

<body>
    <header>
        <h1>File Manager</h1>
    </header>
    <div id="panels-container" class="panels-container">
        <div class="panel">
            <div class="folder-tools">
                <select class="select-drive"></select>
                <button onclick="onButtonUpLevelClick(this)"><i class="fa-solid fa-level-up"></i></button>
                <p class="current-path"></p>
            </div>
            <div class="table-container">
                <table class="content">
                    <thead>
                        <tr>
                            <th>Имя</th>
                            <th>Размер</th>
                            <th>Дата изм.</th>
                        </tr>
                    </thead>
                    <tbody class="content-list">
                    </tbody>
                </table>
            </div>
            <div class="bottom-buttons-container">
                <div class="bottom-buttons">
                    <div>
                        <button onclick="transferElements(this, true)"><i class="fa-solid fa-copy"></i>Copy</button>
                        <button onclick="transferElements(this, false)"><i
                                class="fa-solid fa-level-down"></i>Move</button>
                        <button onclick="deleteElements(this)"><i class="fa-solid fa-scissors"></i>Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
