<style>
    * {
        margin: 1px;
    }

    select,
    button {
        cursor: pointer;
        background-color: darkgray;
    }

    body {
        background-color: darkblue;
        font-family: monospace;
        color: white;
    }

    .folder-tools {
        align-items: center;
        justify-content: left;
        display: flex;
    }

    .folder-tools p {
        margin: 0 0 0 5px;
        white-space: nowrap;
        overflow: auto;
        text-overflow: ellipsis;
    }

    .table-container {
        overflow: auto;
        height: calc(100vh - 120px);
        border: 1px solid;
        border-color: aqua;
    }

    .content {
        margin: 0px;
        border: 1px solid;
        border-radius: 1px;
        border-collapse: collapse;
        color: aqua;
        width: 100%;
        overflow-x: hidden;
    }

    .content th {
        background-color: darkblue;
        color: yellow;
        border-color: aqua;
        position: sticky;
        top: 0;
    }

    .content td,
    th {
        padding: 2px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        border: 1px solid;
    }

    td:nth-child(2),
    td:nth-child(3) {
        text-align: "right";
        width: 60px;
    }

    .bottom-buttons {
        position: sticky;
        bottom: 0;
        border: 1px solid;
        width: 100%;
    }

    .fa {
        margin-right: 2px;
    }

    .selected-row {
        color: darkgray;
    }

    .file-managers-container {
        display: flex;
    }

    .file-manager {
        border: 1px solid;
        width: 50vw;
    }

    tbody tr:hover {
        background: midnightblue;
    }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Simple File Manager</title>
</head>

<body>
    <header>
        <h1>File Manager</h1>
    </header>
    <div id="file-managers-container" class="file-managers-container">
        <div class="file-manager">
            <div class="folder-tools">
                <select class="select-drive"></select>
                <button onclick="onButtonUpLevelClick(this)"><i class="fa-solid fa-level-up"></i></button>
                <p class="current-path"></p>
            </div>
            <div class="table-container">
                <table class="content">
                    <thead>
                        <tr>
                            <th>Имя</th>
                            <th>Размер</th>
                            <th>Дата изм.</th>
                        </tr>
                    </thead>
                    <tbody class="content-list">
                    </tbody>
                </table>
            </div>
            <div class="bottom-buttons-container">
                <div class="bottom-buttons">
                    <div>
                        <button onclick="transferElements(this, true)"><i class="fa-solid fa-copy"></i>Copy</button>
                        <button onclick="transferElements(this, false)"><i
                                class="fa-solid fa-level-down"></i>Move</button>
                        <button onclick="deleteElements(this)"><i class="fa-solid fa-scissors"></i>Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
