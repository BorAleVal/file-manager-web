<style>
    * {
        margin: 1px;
    }

    select,
    button {
        cursor: pointer;
        background-color: darkgray;
    }

    body {
        background-color: darkblue;
        font-family: monospace;
        color: white;
    }

    .folder-tools {
        align-items: center;
        justify-content: left;
        display: flex;
    }

        .folder-tools p {
            margin: 0 0 0 5px;
            white-space: nowrap;
            overflow: auto;
            text-overflow: ellipsis;
        }

    .table-container {
        overflow: auto;
        max-height: calc(100vh - 85px);
        /*возможно через js лучше вычислить сумму других контролов, но так проще*/
        border: 1px solid;
        border-color: aqua;
    }

    .content {
        margin: 0px;
        border: 1px solid;
        border-radius: 1px;
        width: 48vw;
        border-collapse: collapse;
        color: aqua;
    }

        .content th {
            background-color: darkblue;
            color: yellow;
            border-color: aqua;
            position: sticky;
            top: 0;
        }

        .content td,
        th {
            padding: 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            border: 1px solid;
        }

    .bottom-buttons {
        position: fixed;
        bottom: 0;
        border: 1px solid;
        width: 100%;
    }

    .fa {
        margin-right: 2px;
    }

    .selected-row {
        color: darkgray;
    }

    .file-managers {
        display: flex;
    }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous" referrerpolicy="no-referrer" />

<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Simple File Manager</title>
</head>
<body>
    <header>
        <h1>File Manager</h1>
    </header>
    <div id="file-managers" class="file-managers">
        <div class="file-manager">
            <div class="folder-tools">
                <select class="select-drive"></select>
                <button onclick="onButtonUpLevelClick(this)"><i class="fa-solid fa-level-up"></i></button>
                <p class="current-path"></p>
            </div>
            <div class="table-container">
                <table class="content">
                    <thead>
                        <tr>
                            <th>Имя</th>
                            <th>Размер</th>
                            <th>Дата изм.</th>
                        </tr>
                    </thead>
                    <tbody class="content-list">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="bottom-buttons-container">
        <div class="bottom-buttons">
            <div>
                <select id="select-direction" title="направление копирования/переноса">
                    <option value="left-right" title="слева-направо">▶</option>
                    <option value="right-left" title="справа-налево">◀</option>
                </select>
                <button onclick="copy()"><i class="fa-solid fa-copy"></i>Copy</button>
                <button onclick="move()"><i class="fa-solid fa-level-down"></i>Move</button>
                <button onclick="deleteFile()"><i class="fa-solid fa-scissors"></i>Delete</button>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
